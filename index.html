<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry's Prompts — harryashu.online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060608;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --accent: #7c5cfc;
    --accent2: #fc5c8a;
    --text: #e8e6f0;
    --muted: #6b6880;
    --tag-bg: rgba(124,92,252,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(124,92,252,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 8s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(252,92,138,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 10s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(30px, 20px); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 60px 40px 40px;
    text-align: center;
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
  }

  .back-btn {
    position: absolute;
    left: 32px;
    top: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn svg { width: 14px; height: 14px; }

  .site-tag {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid rgba(124,92,252,0.3);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 70%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.04em;
  }

  /* Filter bar */
  .filter-bar {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 10px;
    padding: 24px 40px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .filter-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--muted);
    padding: 7px 18px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(124,92,252,0.2);
    border-color: var(--accent);
    color: var(--text);
  }

  /* Search */
  .search-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    padding: 0 40px 24px;
  }
  .search-input {
    width: 100%;
    max-width: 500px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text);
    padding: 12px 20px 12px 44px;
    border-radius: 100px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: calc(50% - 250px + 16px);
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* Grid */
  .grid {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    padding: 0 40px 60px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(12px);
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: rgba(124,92,252,0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,92,252,0.1);
  }
  .card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }

  .card-emoji {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-tag {
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--tag-bg);
    border: 1px solid rgba(124,92,252,0.25);
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }

  .card-prompt {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--glass-border);
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover {
    background: rgba(124,92,252,0.3);
    border-color: var(--accent);
    color: #fff;
  }
  .copy-btn.copied {
    background: rgba(92,252,140,0.15);
    border-color: rgba(92,252,140,0.4);
    color: #5cfc8c;
  }

  .card-use {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,6,8,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #0e0c14;
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: 20px;
    padding: 32px;
    max-width: 600px;
    width: 100%;
    position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 60px rgba(124,92,252,0.1);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { color: #fff; border-color: rgba(255,255,255,0.2); }

  .modal-emoji { font-size: 40px; margin-bottom: 12px; }
  .modal-tag { display: inline-block; margin-bottom: 10px; font-size: 10px; letter-spacing: 0.12em; padding: 3px 10px; border-radius: 100px; background: var(--tag-bg); border: 1px solid rgba(124,92,252,0.25); color: var(--accent); text-transform: uppercase; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .modal-use { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  .modal-prompt {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 260px;
    overflow-y: auto;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
  }

  .modal-prompt::-webkit-scrollbar { width: 4px; }
  .modal-prompt::-webkit-scrollbar-track { background: transparent; }
  .modal-prompt::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  .modal-copy {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }
  .modal-copy:hover { opacity: 0.9; transform: translateY(-1px); }
  .modal-copy.copied { background: linear-gradient(135deg, #2dd4bf, #22c55e); }

  /* Count badge */
  .count-badge {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid rgba(124,92,252,0.2);
    color: var(--muted);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    margin-left: 10px;
    vertical-align: middle;
    font-family: 'DM Mono', monospace;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 50px 20px 30px; }
    .grid { padding: 0 16px 40px; grid-template-columns: 1fr; }
    .filter-bar { padding: 16px 16px; }
    .search-wrap { padding: 0 16px 16px; }
    .search-icon { left: calc(16px + 16px); }
    h1 { font-size: 2rem; }
    .back-btn { left: 16px; top: 16px; }
  }
</style>
</head>
<body>

<header>
  <a href="https://harryashu.online" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    harryashu.online
  </a>
  <div class="site-tag">✦ harryashu_ prompts</div>
  <h1>My Prompt<br>Collection</h1>
  <p class="subtitle">handpicked prompts • copy & use • no fluff</p>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('all', this)">All <span class="count-badge" id="totalCount">0</span></button>
  <!-- Category buttons auto-generated -->
</div>

<div class="search-wrap">
  <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" class="search-input" placeholder="search prompts..." id="searchInput" oninput="renderCards()">
</div>

<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-emoji" id="mEmoji"></div>
    <span class="modal-tag" id="mTag"></span>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-use" id="mUse"></div>
    <div class="modal-prompt" id="mPrompt"></div>
    <button class="modal-copy" id="mCopyBtn" onclick="modalCopy()">Copy Prompt</button>
  </div>
</div>

<script>
// ============================================================
//  🎯 YAHAN APNE PROMPTS ADD KAR — SUPER EASY!
//
//  Ek naya prompt add karna ho toh bas neeche wala format copy kar:
//  {
//    emoji: "🔥",          ← koi bhi emoji
//    title: "Prompt ka naam",
//    category: "Category Name",   ← filter mein auto aayega
//    use: "Kahan use karna hai",
//    prompt: `Yahan apna actual prompt likho.
//             Multiple lines bhi chalti hain.`
//  },
// ============================================================

const PROMPTS = [
  {
    emoji: "🎮",
    title: "BGMI Game Analysis",
    category: "Gaming",
    use: "BGMI match review ke liye",
    prompt: `Analyze my BGMI match stats and give me:
1. What I did well
2. Where I made mistakes
3. Positioning tips for this specific map
4. 3 specific drills to improve my weak points

My stats: [paste your match stats here]
Map played: [Erangel/Miramar/Sanhok/Vikendi]`
  },
  {
    emoji: "🎨",
    title: "UI Design Feedback",
    category: "Design",
    use: "Website ya app design review",
    prompt: `Review this UI design and give feedback on:
- Visual hierarchy (what draws attention first?)
- Color palette harmony
- Typography choices
- Spacing and layout balance
- Mobile responsiveness concerns
- 3 specific improvements to make it more premium

Design context: [describe your design or paste screenshot]`
  },
  {
    emoji: "✍️",
    title: "Caption Creator",
    category: "Content",
    use: "Instagram post captions ke liye",
    prompt: `Write 5 Instagram caption options for this post.
Make them:
- Engaging and not cringe
- Mix of Hinglish and English
- Include relevant emojis (not too many)
- End with a question to boost comments
- One short punchy, one detailed storytelling style

Post topic: [describe your post]
My vibe/aesthetic: dark, chill, real`
  },
  {
    emoji: "💻",
    title: "Code Explainer",
    category: "Dev",
    use: "Code samajhne ke liye",
    prompt: `Explain this code to me like I'm smart but new to this concept.
- What does it do overall?
- Break down each important line
- What could go wrong?
- How would you improve it?
- Give me a simpler version if possible

\`\`\`
[paste your code here]
\`\`\``
  },
  {
    emoji: "🚀",
    title: "Project Idea Validator",
    category: "Dev",
    use: "Naya project start karne se pehle",
    prompt: `I want to build: [your project idea]

Please tell me:
1. Is this actually useful or just "cool idea"?
2. Who is the real target user?
3. What already exists like this?
4. What's my unique angle?
5. Minimum features needed for v1 (MVP)
6. Biggest technical challenge I'll face
7. Honest difficulty rating: Easy / Medium / Hard`
  },
  {
    emoji: "🧠",
    title: "Study Plan Generator",
    category: "Productivity",
    use: "Exam ya skill ke liye study plan",
    prompt: `Create a realistic study plan for me.

Topic: [what you want to learn]
Time available: [X hours per day]
Deadline: [date or weeks]
Current level: [beginner/intermediate]
Learning style: [videos/reading/practice problems]

Make it:
- Day-by-day schedule
- Include breaks (be real, not motivational-poster fake)
- Resources for each section
- Progress checkpoints
- What to do when I feel stuck`
  },
  {
    emoji: "🎵",
    title: "Playlist Vibe Curator",
    category: "Content",
    use: "Playlist description ya reel ke liye",
    prompt: `Create a playlist description + tracklist for this vibe:

Mood/Aesthetic: [describe the feeling]
Genre mix: [e.g. lo-fi, drill, indie, phonk]
Time of day it's meant for: [late night / morning / gym / etc]
Language preference: [Hindi / English / both]

Give me:
- A poetic 2-line description for Instagram
- 10 song recommendations
- What emotion each song hits`
  },
  {
    emoji: "📱",
    title: "Viral Reel Hook Writer",
    category: "Content",
    use: "Instagram Reels ke liye hooks",
    prompt: `Write 10 scroll-stopping hooks for my reel.

Topic: [what is your reel about]
Target audience: [who watches your content]
Tone: [funny/informative/aesthetic/motivational]

Rules:
- First 3 words must be attention-grabbing
- No cringe "this will change your life" type
- Mix of question hooks, shock hooks, story hooks
- Keep each under 10 words
- Hinglish welcome`
  },
];

// ============================================================
// Baaki sab automatic hai — neeche mat chhedo 😅
// ============================================================

let activeFilter = 'all';
let activeModal = null;

function getCategories() {
  const cats = [...new Set(PROMPTS.map(p => p.category))];
  return cats;
}

function buildFilters() {
  const bar = document.getElementById('filterBar');
  const cats = getCategories();
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => setFilter(cat, btn);
    bar.appendChild(btn);
  });
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function renderCards() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('grid');
  
  let filtered = PROMPTS.filter(p => {
    const matchCat = activeFilter === 'all' || p.category === activeFilter;
    const matchSearch = !query || 
      p.title.toLowerCase().includes(query) || 
      p.prompt.toLowerCase().includes(query) ||
      p.category.toLowerCase().includes(query);
    return matchCat && matchSearch;
  });

  document.getElementById('totalCount').textContent = PROMPTS.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">koi prompt nahi mila 😔<br><small style="font-size:11px;margin-top:8px;display:block">try a different search ya filter</small></div>';
    return;
  }

  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s" onclick="openModal(${PROMPTS.indexOf(p)})">
      <div class="card-top">
        <span class="card-emoji">${p.emoji}</span>
        <span class="card-tag">${p.category}</span>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-prompt">${p.prompt}</div>
      <div class="card-footer">
        <span class="card-use">📌 ${p.use}</span>
        <button class="copy-btn" onclick="quickCopy(event, ${PROMPTS.indexOf(p)}, this)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>
  `).join('');
}

function quickCopy(e, idx, btn) {
  e.stopPropagation();
  navigator.clipboard.writeText(PROMPTS[idx].prompt).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  });
}

function openModal(idx) {
  const p = PROMPTS[idx];
  activeModal = idx;
  document.getElementById('mEmoji').textContent = p.emoji;
  document.getElementById('mTag').textContent = p.category;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mUse').textContent = '📌 ' + p.use;
  document.getElementById('mPrompt').textContent = p.prompt;
  const btn = document.getElementById('mCopyBtn');
  btn.textContent = 'Copy Prompt';
  btn.className = 'modal-copy';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function modalCopy() {
  if (activeModal === null) return;
  navigator.clipboard.writeText(PROMPTS[activeModal].prompt).then(() => {
    const btn = document.getElementById('mCopyBtn');
    btn.textContent = '✓ Copied to Clipboard!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Prompt';
      btn.classList.remove('copied');
    }, 2500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
});

buildFilters();
renderCards();
</script>
</body>
</html>
